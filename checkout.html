<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout | Bloom Bouquet</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo">

🌸 Bloom Bouquet

</div>

<nav>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="cart.html">Keranjang</a></li>

</ul>

</nav>

</header>

<section class="checkout-page">

<h2>Checkout</h2>

<div class="checkout-container">

<form id="checkoutForm">

<h3>Data Penerima</h3>

<input
type="text"
placeholder="Nama Lengkap"
required>

<input
type="email"
placeholder="Email"
required>

<input
type="tel"
placeholder="Nomor WhatsApp"
required>

<textarea
placeholder="Alamat Lengkap"
required></textarea>

<input
type="text"
placeholder="Kota"
required>

<input
type="text"
placeholder="Provinsi"
required>

<input
type="text"
placeholder="Kode Pos"
required>

<h3>Metode Pembayaran</h3>

<label>

<input
type="radio"
name="payment"
value="Transfer"
checked>

Transfer Bank

</label>

<label>

<input
type="radio"
name="payment"
value="QRIS">

QRIS

</label>

<label>

<input
type="radio"
name="payment"
value="E-Wallet">

E-Wallet

</label>

<button
class="btn"
type="submit">

Lanjut Pembayaran

</button>

</form>

</div>

</section>

<footer>

<p>

© 2026 Bloom Bouquet

</p>

</footer>

<script src="checkout.js"></script>

</body>

</html>
