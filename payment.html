<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pembayaran | Bloom Bouquet</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo">

🌸 Bloom Bouquet

</div>

</header>

<section class="payment-page">

<h2>Pembayaran</h2>

<div class="payment-container">

<div class="payment-left">

<h3>Metode Pembayaran</h3>

<label class="payment-card">

<input type="radio"
name="payment"
checked>

🏦 Transfer Bank

</label>

<label class="payment-card">

<input type="radio"
name="payment">

📱 QRIS

</label>

<label class="payment-card">

<input type="radio"
name="payment">

💳 Dana

</label>

<label class="payment-card">

<input type="radio"
name="payment">

🟢 GoPay

</label>

<label class="payment-card">

<input type="radio"
name="payment">

🟣 OVO

</label>

</div>

<div class="payment-right">

<h3>Ringkasan Pesanan</h3>

<div id="orderSummary">

</div>

<hr>

<h2 id="grandTotal">

Rp0

</h2>

<button
id="payNow"
class="btn">

Bayar Sekarang

</button>

</div>

</div>

</section>

<footer>

<p>

© 2026 Bloom Bouquet

</p>

</footer>

<script src="payment.js"></script>

</body>

</html>
